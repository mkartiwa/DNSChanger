apply plugin: 'com.android.application'

android {
    compileSdk 35
    namespace "com.dnschanger.app"

    defaultConfig {
        applicationId "com.dnschanger.app"
        minSdk 22
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {}
